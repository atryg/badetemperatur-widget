name: Update badetemperaturer

on:
  workflow_dispatch:
  schedule:
    # GitHub cron runs in UTC and scheduled runs can start late. Trigger
    # hourly in the broad UTC window, then let the script do Yr calls only
    # when data is at least two hours old and local time is 06:00-00:59.
    - cron: "17 4-23 * * *"

permissions:
  contents: write

concurrency:
  group: update-badetemperaturer
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Fetch city top 5 data
        id: update
        env:
          YR_BADETEMPERATURER_API_KEY: ${{ secrets.YR_BADETEMPERATURER_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            node scripts/update-badetemperaturer.mjs --respect-schedule
          else
            node scripts/update-badetemperaturer.mjs
          fi

      - name: Commit updated JSON
        if: steps.update.outputs.updated == 'true'
        run: |
          if [ -z "$(git status --porcelain -- public/data)" ]; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "Update city badetemperaturer"

          for attempt in 1 2 3; do
            git pull --rebase origin main

            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push failed on attempt ${attempt}. Retrying with latest main."
            sleep $((attempt * 2))
          done

          echo "Unable to push updated data after 3 attempts."
          exit 1
