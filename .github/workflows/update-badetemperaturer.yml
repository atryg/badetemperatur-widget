name: Update badetemperaturer

on:
  workflow_dispatch:
  schedule:
    # GitHub cron runs in UTC. The script gates actual Yr calls to
    # 06:00, 08:00, ..., 22:00 Europe/Oslo so DST stays correct.
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: update-badetemperaturer
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Fetch Trondheim top 5
        id: update
        env:
          YR_BADETEMPERATURER_API_KEY: ${{ secrets.YR_BADETEMPERATURER_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            node scripts/update-badetemperaturer.mjs --respect-schedule
          else
            node scripts/update-badetemperaturer.mjs
          fi

      - name: Commit updated JSON
        if: steps.update.outputs.updated == 'true'
        run: |
          if git diff --quiet -- public/data/trondheim-top5.json; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/trondheim-top5.json
          git commit -m "Update Trondheim badetemperaturer"
          git push
